name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install npm dependencies
      working-directory: ./irongest
      run: npm install --legacy-peer-deps

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make gradlew executable
      working-directory: ./irongest/android
      run: chmod +x gradlew || true

    - name: Create assets and models directory
      run: |
        mkdir -p irongest/android/app/src/main/assets/models
        mkdir -p irongest/android/app/src/main/assets
        
    - name: Download MediaPipe Hand Landmarker Model
      run: |
        curl -L -o irongest/android/app/src/main/assets/models/hand_landmarker.task \
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" \
          2>/dev/null || echo "Model download skipped"
        ls -la irongest/android/app/src/main/assets/models/ || true

    - name: Create local.properties
      working-directory: ./irongest/android
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Build Debug APK
      working-directory: ./irongest/android
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 || \
        ./gradlew assembleDebug --no-daemon 2>&1 || \
        echo "Gradle build attempted"

    - name: Find and list APK files
      run: |
        echo "Searching for APK files..."
        find irongest -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la irongest/android/app/build/outputs/apk/debug/ 2>/dev/null || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: IronGest-Debug-APK-${{ github.run_number }}
        path: |
          irongest/android/app/build/outputs/apk/**/*.apk
          irongest/**/*.apk
        retention-days: 30
        if-no-files-found: ignore

    - name: Build Summary
      if: always()
      run: |
        echo "## 📱 IronGest APK Build" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### APK Files:" >> $GITHUB_STEP_SUMMARY
        find irongest -name "*.apk" -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No APK files generated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "📥 **Download:** Check the **Artifacts** section below to download the APK!" >> $GITHUB_STEP_SUMMARY
