name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Debug - Show directory structure
      run: |
        echo "Root directory:"
        ls -la
        echo ""
        echo "IronGest directory:"
        ls -la irongest/ || true
        echo ""
        echo "Android directory:"
        ls -la irongest/android/ || true
        echo ""
        echo "Android app directory:"
        ls -la irongest/android/app/ || true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Debug - Show Android SDK
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        ls -la $ANDROID_HOME || true

    - name: Install dependencies
      working-directory: ./irongest
      run: |
        npm install --legacy-peer-deps 2>&1 || npm install 2>&1

    - name: Create local.properties
      working-directory: ./irongest/android
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        cat local.properties

    - name: Make gradlew executable
      working-directory: ./irongest/android
      run: chmod +x gradlew

    - name: Build Debug APK
      working-directory: ./irongest/android
      run: |
        echo "Building..."
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 || {
          echo "Gradle build failed, trying alternative..."
          ./gradlew assembleDebug --no-daemon 2>&1 || true
        }

    - name: Find APK files
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: IronGest-APK-${{ github.run_number }}
        path: |
          irongest/android/app/build/outputs/apk/**/*.apk
        retention-days: 30
        if-no-files-found: ignore
