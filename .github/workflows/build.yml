name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      working-directory: irongest
      run: npm install --legacy-peer-deps

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-home-cache-cleanup: true

    - name: Create debug keystore
      working-directory: irongest/android/app
      run: |
        if [ ! -f debug.keystore ]; then
          keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
        fi

    - name: Grant gradlew permission
      working-directory: irongest/android
      run: chmod +x gradlew || true

    - name: Build Debug APK
      id: build
      working-directory: irongest/android
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties || true
        ./gradlew assembleDebug --no-daemon --info 2>&1 || true

    - name: Find APKs
      run: |
        echo "Finding APK files..."
        find . -name "*.apk" -type f 2>/dev/null || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: IronGest-APK
        path: |
          irongest/android/app/build/outputs/apk/**/*.apk
          **/*.apk
        retention-days: 30
        if-no-files-found: ignore
