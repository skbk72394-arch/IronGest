name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: List files
      run: ls -la irongest/android/
    
    - name: Build APK
      working-directory: irongest/android
      run: |
        chmod +x gradlew || true
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        ./gradlew assembleDebug --no-daemon --info
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: IronGest-APK
        path: irongest/android/app/build/outputs/apk/**/*.apk
        if-no-files-found: ignore
