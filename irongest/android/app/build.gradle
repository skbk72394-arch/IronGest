apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * IronGest - Android Application Build Configuration
 * Production-grade build configuration with MediaPipe Android SDK
 */

react {
    /* Folders */
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
    cliFile = file("../../node_modules/react-native/cli.js")
    debuggableVariants = ["liteDebug", "debug"]
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.irongest"

    defaultConfig {
        applicationId "com.irongest"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        
        // Build config for new architecture
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", "true"
    }

    // Signing configuration
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('RELEASE_STORE_FILE')) {
                storeFile file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias RELEASE_KEY_ALIAS
                keyPassword RELEASE_KEY_PASSWORD
            } else {
                // Use debug keystore for local builds
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    // Build types
    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }

        release {
            debuggable false
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    // Product flavors
    flavorDimensions "performance"
    productFlavors {
        lite {
            dimension "performance"
            buildConfigField "boolean", "LOW_PERFORMANCE_MODE", "true"
        }
        full {
            dimension "performance"
            buildConfigField "boolean", "LOW_PERFORMANCE_MODE", "false"
        }
    }

    // Lint options
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    // Packaging options
    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
        pickFirst '**/libjsi.so'
        pickFirst '**/libfolly_json.so'
        pickFirst '**/libfolly_runtime.so'
        pickFirst '**/libglog.so'
        pickFirst '**/libhermes.so'
    }

    // Compile options
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    // Build features
    buildFeatures {
        buildConfig true
        viewBinding true
    }
}

// Dependencies
dependencies {
    // React Native
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation "com.facebook.react:react-native:+"
    implementation "com.facebook.react:hermes-android:+"

    // Kotlin
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

    // AndroidX
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'com.google.android.material:material:1.11.0'

    // CameraX
    implementation 'androidx.camera:camera-core:1.3.1'
    implementation 'androidx.camera:camera-camera2:1.3.1'
    implementation 'androidx.camera:camera-lifecycle:1.3.1'
    implementation 'androidx.camera:camera-view:1.3.1'

    // MediaPipe Hands - Using official Android SDK
    implementation 'com.google.mediapipe:tasks-vision:0.10.9'

    // React Native Reanimated
    implementation project(':react-native-reanimated')

    // React Native Gesture Handler
    implementation project(':react-native-gesture-handler')

    // React Native SVG
    implementation project(':react-native-svg')

    // React Native Screens
    implementation project(':react-native-screens')

    // React Native Safe Area Context
    implementation project(':react-native-safe-area-context')

    // Vision Camera
    implementation project(':react-native-vision-camera')

    // Haptic Feedback
    implementation 'com.github.jgreth:react-native-haptic-feedback:2.2.0'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'

    // Debug dependencies
    debugImplementation 'com.facebook.soloader:soloader:0.10.5'
}

// Apply native modules
apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
