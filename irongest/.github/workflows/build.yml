name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'irongest/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
        - debug
        - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: irongest/package-lock.json

    - name: Install npm dependencies
      working-directory: ./irongest
      run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create local.properties
      working-directory: ./irongest/android
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties

    - name: Make gradlew executable
      working-directory: ./irongest/android
      run: chmod +x gradlew

    - name: Download MediaPipe Hand Landmarker
      run: |
        mkdir -p irongest/android/app/src/main/assets/models
        echo "Downloading MediaPipe model..."
        curl -L -o irongest/android/app/src/main/assets/models/hand_landmarker.task \
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" \
          2>/dev/null || echo "Model download failed - will continue without"

    - name: Build Debug APK
      working-directory: ./irongest/android
      run: |
        ./gradlew clean
        ./gradlew assembleDebug --no-daemon --stacktrace || \
        ./gradlew assembleLiteDebug --no-daemon --stacktrace

    - name: Rename APK
      run: |
        cd irongest/android/app/build/outputs/apk
        for apk in $(find . -name "*.apk"); do
          new_name="IronGest-$(basename $apk)"
          cp "$apk" "$new_name" 2>/dev/null || true
        done

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: IronGest-APK-${{ github.run_number }}
        path: |
          irongest/android/app/build/outputs/apk/**/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Create Release APK artifact name
      run: |
        echo "APK_NAME=IronGest-APK-${{ github.run_number }}" >> $GITHUB_ENV

    - name: Job Summary
      if: always()
      run: |
        echo "## 📱 IronGest APK Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### APK Files:" >> $GITHUB_STEP_SUMMARY
        find irongest/android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No APK files generated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### How to Download:" >> $GITHUB_STEP_SUMMARY
        echo "1. Scroll to the **Artifacts** section below" >> $GITHUB_STEP_SUMMARY
        echo "2. Click on **IronGest-APK-${{ github.run_number }}**" >> $GITHUB_STEP_SUMMARY
        echo "3. Download and extract the ZIP file" >> $GITHUB_STEP_SUMMARY
        echo "4. Install the APK on your Android device" >> $GITHUB_STEP_SUMMARY

  # Optional: EAS Build for users with Expo account
  eas-build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && secrets.EXPO_TOKEN != '' }}
    needs: build
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install -g eas-cli
    - working-directory: ./irongest
      run: eas build --platform android --profile apk --non-interactive
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
